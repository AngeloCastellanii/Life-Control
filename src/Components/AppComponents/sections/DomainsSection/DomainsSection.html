<section class="domains-section lc-card">
  <h1 class="lc-section-title">Dominios</h1>
  <p class="lc-section-subtitle">Etiquetas globales con color. Cada tarea pertenecerá a un dominio.</p>

  <form class="domains-section__form" data-role="form" method="post" action="#">
    <div class="domains-section__field">
      <label class="lc-label" for="domain-name">Nombre</label>
      <input class="lc-input" id="domain-name" name="name" type="text" placeholder="Universidad, Emprendimiento…" required />
    </div>
    <div class="domains-section__field domains-section__field--color">
      <label class="lc-label" for="domain-color">Color</label>
      <input class="domains-section__color" id="domain-color" name="color" type="color" value="#2563eb" />
    </div>
    <div class="domains-section__actions" data-role="form-actions"></div>
  </form>

  <ul class="domains-section__list" data-role="list"></ul>
  <p class="domains-section__empty" data-role="empty" hidden>Sin dominios todavía.</p>
</section>
