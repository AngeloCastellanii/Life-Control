<section class="shopping-section">
  <header class="lc-view-hero">
    <span class="lc-view-hero__icon lc-view-hero__icon--shopping" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="20" r="1" />
        <circle cx="18" cy="20" r="1" />
        <path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h9.2a2 2 0 0 0 2-1.6L22 7H6" />
      </svg>
    </span>
    <div class="lc-view-hero__text">
      <h1 class="lc-section-title lc-view-hero__title">Compras</h1>
      <p class="lc-view-hero__subtitle">Listas por frecuencia. Selecciona un artículo y usa ✎ o × en cada columna.</p>
    </div>
  </header>

  <div class="shopping-section__board">
    <div class="shopping-section__col lc-card" data-frequency="daily">
      <div class="shopping-section__col-head">
        <div class="lc-view-card-head shopping-section__col-title-wrap">
          <span class="lc-view-card-icon lc-view-card-icon--primary" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <circle cx="12" cy="12" r="8" />
              <path d="M12 8v4l2 2" stroke-linecap="round" />
            </svg>
          </span>
          <h2 class="lc-view-card-label">Diaria</h2>
        </div>
        <div class="shopping-section__col-actions">
          <button type="button" class="shopping-section__col-btn" data-action="edit" aria-label="Editar seleccionado">✎</button>
          <button type="button" class="shopping-section__col-btn shopping-section__col-btn--danger" data-action="delete" aria-label="Eliminar seleccionado">×</button>
        </div>
      </div>
      <ul class="shopping-section__list" data-role="daily-list"></ul>
      <p class="shopping-section__empty lc-empty" data-role="daily-empty" hidden>Sin artículos.</p>
    </div>
    <div class="shopping-section__col lc-card" data-frequency="weekly">
      <div class="shopping-section__col-head">
        <div class="lc-view-card-head shopping-section__col-title-wrap">
          <span class="lc-view-card-icon lc-view-card-icon--orange" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <rect x="4" y="5" width="16" height="15" rx="2" />
              <path d="M8 3v4M16 3v4M4 10h16" stroke-linecap="round" />
            </svg>
          </span>
          <h2 class="lc-view-card-label">Semanal</h2>
        </div>
        <div class="shopping-section__col-actions">
          <button type="button" class="shopping-section__col-btn" data-action="edit" aria-label="Editar seleccionado">✎</button>
          <button type="button" class="shopping-section__col-btn shopping-section__col-btn--danger" data-action="delete" aria-label="Eliminar seleccionado">×</button>
        </div>
      </div>
      <ul class="shopping-section__list" data-role="weekly-list"></ul>
      <p class="shopping-section__empty lc-empty" data-role="weekly-empty" hidden>Sin artículos.</p>
    </div>
    <div class="shopping-section__col lc-card" data-frequency="monthly">
      <div class="shopping-section__col-head">
        <div class="lc-view-card-head shopping-section__col-title-wrap">
          <span class="lc-view-card-icon lc-view-card-icon--blue" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <rect x="3" y="4" width="18" height="17" rx="2" />
              <path d="M3 10h18M8 2v4M16 2v4" stroke-linecap="round" />
            </svg>
          </span>
          <h2 class="lc-view-card-label">Mensual</h2>
        </div>
        <div class="shopping-section__col-actions">
          <button type="button" class="shopping-section__col-btn" data-action="edit" aria-label="Editar seleccionado">✎</button>
          <button type="button" class="shopping-section__col-btn shopping-section__col-btn--danger" data-action="delete" aria-label="Eliminar seleccionado">×</button>
        </div>
      </div>
      <ul class="shopping-section__list" data-role="monthly-list"></ul>
      <p class="shopping-section__empty lc-empty" data-role="monthly-empty" hidden>Sin artículos.</p>
    </div>
    <div class="shopping-section__col lc-card" data-frequency="yearly">
      <div class="shopping-section__col-head">
        <div class="lc-view-card-head shopping-section__col-title-wrap">
          <span class="lc-view-card-icon lc-view-card-icon--purple" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M12 3l2.5 7.5H22l-6 4.5 2.5 7.5L12 18l-6.5 4.5 2.5-7.5-6-4.5h7.5L12 3z" stroke-linejoin="round" />
            </svg>
          </span>
          <h2 class="lc-view-card-label">Anual</h2>
        </div>
        <div class="shopping-section__col-actions">
          <button type="button" class="shopping-section__col-btn" data-action="edit" aria-label="Editar seleccionado">✎</button>
          <button type="button" class="shopping-section__col-btn shopping-section__col-btn--danger" data-action="delete" aria-label="Eliminar seleccionado">×</button>
        </div>
      </div>
      <ul class="shopping-section__list" data-role="yearly-list"></ul>
      <p class="shopping-section__empty lc-empty" data-role="yearly-empty" hidden>Sin artículos.</p>
    </div>
  </div>

  <aside class="shopping-section__detail lc-card" data-role="detail" hidden>
    <p class="lc-view-stat__label" data-role="detail-period"></p>
    <h3 class="shopping-section__detail-name" data-role="detail-name"></h3>
    <p class="shopping-section__detail-meta" data-role="detail-meta"></p>
  </aside>
</section>
