<section class="focus-section">
  <header class="lc-view-hero">
    <span class="lc-view-hero__icon lc-view-hero__icon--focus" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <circle cx="12" cy="12" r="9" />
        <circle cx="12" cy="12" r="4" />
        <circle cx="12" cy="12" r="0.6" fill="currentColor" />
      </svg>
    </span>
    <div class="lc-view-hero__text">
      <h1 class="lc-section-title lc-view-hero__title">Modo enfoque</h1>
      <p class="lc-view-hero__subtitle" data-role="clock">—</p>
    </div>
  </header>

  <div class="lc-card focus-section__block">
    <span class="focus-section__block-tag" data-role="block-tag">Ahora</span>
    <h2 class="focus-section__block-label" data-role="block-label">Sin bloque activo</h2>
    <p class="focus-section__block-range" data-role="block-range"></p>
    <ul class="focus-section__tasks" data-role="tasks"></ul>
    <p class="lc-empty" data-role="empty" hidden>No hay tareas en este bloque. Buen momento para descansar o adelantar algo.</p>
  </div>
</section>
