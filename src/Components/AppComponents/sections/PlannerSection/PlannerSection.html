<section class="planner-section">
  <div class="planner-section__header">
    <h1 class="lc-section-title">Planificador</h1>
  </div>

  <div class="planner-section__toolbar">
    <div class="planner-section__nav">
      <button type="button" class="planner-section__nav-btn" data-role="prev" aria-label="Anterior">‹</button>
      <span class="planner-section__period" data-role="period-label"></span>
      <button type="button" class="planner-section__nav-btn" data-role="next" aria-label="Siguiente">›</button>
      <button type="button" class="planner-section__today lc-btn-ghost" data-role="today">Hoy</button>
    </div>
    <div class="planner-section__controls">
      <button type="button" class="lc-btn-outline" data-role="add-block">Configurar Bloques</button>
      <div class="planner-section__view-toggle" data-role="view-toggle">
        <button type="button" class="planner-section__view-btn" data-view="day">Día</button>
        <button type="button" class="planner-section__view-btn" data-view="week">Semana</button>
        <button type="button" class="planner-section__view-btn" data-view="month">Mes</button>
      </div>
    </div>
  </div>

  <div data-role="view-day">
    <div class="grid min-h-[360px] gap-4 lg:grid-cols-[7fr_3fr]">
      <div class="flex flex-col gap-4">
        <div class="lc-card">
          <h2 class="lc-card-title">Flujo de caja del día</h2>
          <div class="planner-section__cash-flow" data-role="cash-flow"></div>
          <p class="lc-empty" data-role="cash-flow-empty" hidden>Sin movimientos para este día.</p>
        </div>
        <div class="lc-card">
          <div class="flex flex-col gap-3" data-role="blocks"></div>
          <p class="lc-empty" data-role="blocks-empty" hidden>Sin bloques. Configura uno arriba.</p>
        </div>
      </div>
      <aside class="lc-card">
        <h2 class="lc-card-title">Bandeja de Entrada <span class="planner-section__inbox-count" data-role="inbox-count"></span></h2>
        <div class="flex flex-col gap-2.5" data-role="tasks"></div>
        <p class="lc-empty" data-role="empty" hidden>Sin tareas. Pulsa +.</p>
      </aside>
    </div>
  </div>

  <div data-role="view-week" hidden>
    <div class="planner-week" data-role="week-grid"></div>
  </div>

  <div data-role="view-month" hidden>
    <div class="planner-month">
      <div class="planner-month__weekdays">
        <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
      </div>
      <div class="planner-month__grid" data-role="month-grid"></div>
    </div>
  </div>
</section>
