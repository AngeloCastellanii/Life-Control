<section class="planner-section">
  <h1 class="lc-section-title">Planificador</h1>
  <p class="lc-section-subtitle">Bloques de tiempo a la izquierda, inbox a la derecha. Pulsa + para tareas.</p>

  <div class="planner-section__layout">
    <div class="planner-section__canvas lc-card">
      <h2 class="planner-section__panel-title">Lienzo</h2>
      <p class="planner-section__placeholder">Time blocks y drag & drop</p>
    </div>
    <aside class="planner-section__inbox lc-card">
      <h2 class="planner-section__panel-title">Inbox</h2>
      <div class="planner-section__tasks" data-role="tasks"></div>
      <p class="planner-section__empty" data-role="empty" hidden>Sin tareas. Pulsa +.</p>
    </aside>
  </div>
</section>
