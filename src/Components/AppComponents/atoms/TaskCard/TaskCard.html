<article class="task-card" data-role="root">
  <label class="task-card__check-wrap">
    <input class="task-card__check" data-role="check" type="checkbox" />
    <span class="task-card__check-ui"></span>
  </label>
  <div class="task-card__body" data-role="body">
    <p class="task-card__title" data-role="title"></p>
    <div class="task-card__meta">
      <span class="lc-domain-badge task-card__domain" data-role="domain" hidden></span>
      <span class="task-card__urgency" data-role="urgency"></span>
      <span class="task-card__minutes" data-role="minutes"></span>
    </div>
  </div>
  <div class="task-card__assign" data-role="assign-wrap" hidden>
    <select class="task-card__block-select lc-input" data-role="block-select" aria-label="Elegir bloque"></select>
    <button type="button" class="task-card__assign-btn" data-role="assign-btn" aria-label="Asignar al bloque">Asignar</button>
  </div>
  <div class="task-card__actions" data-role="actions">
    <button type="button" class="task-card__action" data-role="edit" hidden aria-label="Editar tarea">✎</button>
    <button type="button" class="task-card__action task-card__action--danger" data-role="delete" hidden aria-label="Eliminar tarea">×</button>
  </div>
  <button type="button" class="task-card__remove" data-role="remove" hidden aria-label="Sacar del bloque" title="Sacar al inbox">↩</button>
  <span class="task-card__accent" data-role="accent"></span>
</article>
