<article class="time-block" data-role="root">
  <header class="time-block__header">
    <div class="time-block__header-top">
      <div class="time-block__head-main">
        <div class="time-block__title-row">
          <h3 class="time-block__label" data-role="label"></h3>
          <span class="time-block__rule" data-role="rule"></span>
        </div>
        <p class="time-block__time" data-role="time"></p>
      </div>
      <div class="time-block__actions">
        <button type="button" class="time-block__action" data-role="edit" aria-label="Editar bloque">✎</button>
        <button type="button" class="time-block__action time-block__action--danger" data-role="delete" aria-label="Eliminar bloque">×</button>
      </div>
    </div>
    <div class="time-block__stats">
      <span class="time-block__usage" data-role="usage"></span>
      <span class="time-block__free" data-role="free"></span>
    </div>
  </header>
  <div class="time-block__progress-wrap">
    <div class="time-block__progress" data-role="progress">
      <div class="time-block__progress-bar" data-role="progress-bar"></div>
    </div>
  </div>
  <button type="button" class="time-block__toggle-tasks" data-role="toggle-tasks" aria-expanded="true">▾ Tareas</button>
  <div class="time-block__tasks" data-role="tasks"></div>
  <p class="time-block__empty lc-empty" data-role="empty" hidden>Sin tareas en este bloque.</p>
</article>
