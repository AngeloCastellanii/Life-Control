<form class="domain-form" data-role="form">
  <div class="domain-form__field">
    <label class="lc-label" for="domain-form-name">Nombre</label>
    <input class="lc-input" id="domain-form-name" type="text" placeholder="Universidad, Emprendimiento…" required />
  </div>
  <div class="domain-form__field">
    <label class="lc-label" for="domain-form-color">Color</label>
    <input class="domain-form__color" id="domain-form-color" type="color" value="#2563eb" />
  </div>
  <div class="domain-form__actions" data-role="actions"></div>
</form>
