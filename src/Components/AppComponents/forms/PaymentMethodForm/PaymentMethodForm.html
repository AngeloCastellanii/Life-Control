<form class="flex flex-col gap-4" data-role="form">
  <div>
    <label class="lc-label" for="payment-method-form-name">Nombre</label>
    <input class="lc-input" id="payment-method-form-name" type="text" placeholder="Zelle, Binance, Efectivo, Bs…" required maxlength="40" />
  </div>
  <div>
    <label class="lc-label" for="payment-method-form-balance">Saldo actual (USD)</label>
    <input class="lc-input" id="payment-method-form-balance" type="number" step="0.01" placeholder="0.00" />
    <p class="lc-hint">Cuánto tienes ahora en este medio de pago.</p>
  </div>
  <div>
    <span class="lc-label">Color</span>
    <div class="payment-method-form__colors" data-role="colors"></div>
  </div>
  <p class="block-form__error" data-role="error" hidden></p>
  <div class="flex gap-2.5 [&_slice-button]:flex-1" data-role="actions"></div>
</form>
