<div class="task-detail-panel">
  <header class="task-detail-panel__head">
    <h2 class="task-detail-panel__title" data-role="title"></h2>
    <span class="task-detail-panel__status" data-role="status"></span>
  </header>
  <dl class="task-detail-panel__grid">
    <div class="task-detail-panel__row">
      <dt>Dominio</dt>
      <dd data-role="domain"></dd>
    </div>
    <div class="task-detail-panel__row">
      <dt>Urgencia</dt>
      <dd data-role="urgency"></dd>
    </div>
    <div class="task-detail-panel__row">
      <dt>Duración</dt>
      <dd data-role="minutes"></dd>
    </div>
    <div class="task-detail-panel__row">
      <dt>Inicio</dt>
      <dd data-role="start"></dd>
    </div>
    <div class="task-detail-panel__row">
      <dt>Vencimiento</dt>
      <dd data-role="due"></dd>
    </div>
    <div class="task-detail-panel__row">
      <dt>Ubicación</dt>
      <dd data-role="place"></dd>
    </div>
    <div class="task-detail-panel__row" data-role="slot-row" hidden>
      <dt>Horario en bloque</dt>
      <dd data-role="slot"></dd>
    </div>
  </dl>
  <footer class="task-detail-panel__actions">
    <button type="button" class="lc-btn-outline task-detail-panel__edit" data-role="edit">Editar</button>
  </footer>
</div>
