<form class="flex flex-col gap-4" data-role="form">
  <div>
    <label class="lc-label" for="task-form-title">Título</label>
    <input class="lc-input" id="task-form-title" type="text" placeholder="Estudiar capítulo 3…" required />
  </div>
  <div>
    <label class="lc-label" for="task-form-domain">Dominio</label>
    <p class="lc-hint" data-role="domain-hint">Clasifica la tarea por área (aparece con color en el planificador).</p>
    <select class="lc-input" id="task-form-domain" required></select>
  </div>
  <div>
    <label class="lc-label" for="task-form-urgency">Urgencia</label>
    <select class="lc-input" id="task-form-urgency">
      <option value="high">Alta</option>
      <option value="medium" selected>Media</option>
      <option value="low">Baja</option>
    </select>
  </div>
  <div>
    <label class="lc-label" for="task-form-minutes">Duración (min)</label>
    <input class="lc-input" id="task-form-minutes" type="number" min="1" step="1" value="30" required />
  </div>
  <div>
    <label class="lc-label" for="task-form-date">Fecha planificada</label>
    <input class="lc-input" id="task-form-date" type="date" />
  </div>
  <p class="lc-empty" data-role="hint" hidden>Crea un dominio antes de añadir tareas.</p>
  <p class="block-form__error" data-role="error" hidden></p>
  <div class="flex gap-2.5 [&_slice-button]:flex-1" data-role="actions"></div>
</form>
