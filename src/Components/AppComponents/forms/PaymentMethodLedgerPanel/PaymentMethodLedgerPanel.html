<div class="payment-method-ledger">
  <header class="payment-method-ledger__head">
    <div>
      <h2 class="payment-method-ledger__title" data-role="title">Movimientos</h2>
      <p class="payment-method-ledger__subtitle" data-role="subtitle"></p>
    </div>
    <span class="payment-method-ledger__balance" data-role="balance"></span>
  </header>

  <div class="payment-method-ledger__stats">
    <div class="payment-method-ledger__stat payment-method-ledger__stat--in">
      <span class="payment-method-ledger__stat-label">Entradas</span>
      <span class="payment-method-ledger__stat-value" data-role="total-in">$0.00</span>
    </div>
    <div class="payment-method-ledger__stat payment-method-ledger__stat--out">
      <span class="payment-method-ledger__stat-label">Salidas</span>
      <span class="payment-method-ledger__stat-value" data-role="total-out">$0.00</span>
    </div>
  </div>

  <ul class="payment-method-ledger__list" data-role="list"></ul>
  <p class="lc-empty payment-method-ledger__empty" data-role="empty" hidden>
    Sin movimientos en este método todavía.
  </p>
</div>
