<form class="flex flex-col gap-4" data-role="form">
  <div>
    <label class="lc-label" for="wallet-form-balance">Saldo actual (USD)</label>
    <input
      class="lc-input"
      id="wallet-form-balance"
      type="number"
      min="0"
      step="0.01"
      placeholder="0.00"
      required
    />
    <p class="lc-hint">Este es el dinero disponible hoy en tu billetera.</p>
  </div>
  <p class="block-form__error" data-role="error" hidden></p>
  <div class="flex gap-2.5 [&_slice-button]:flex-1" data-role="actions"></div>
</form>
