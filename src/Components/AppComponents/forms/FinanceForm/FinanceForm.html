<form class="flex flex-col gap-4" data-role="form">
  <div>
    <label class="lc-label" for="finance-form-type">Tipo</label>
    <select class="lc-input" id="finance-form-type">
      <option value="pay">Egreso / por pagar</option>
      <option value="receive">Ingreso / por cobrar</option>
    </select>
  </div>
  <div>
    <label class="lc-label" for="finance-form-description">Descripción</label>
    <input class="lc-input" id="finance-form-description" type="text" placeholder="Alquiler, cliente X…" required />
  </div>
  <div>
    <label class="lc-label" for="finance-form-amount">Monto (USD)</label>
    <input class="lc-input" id="finance-form-amount" type="number" min="0.01" step="0.01" placeholder="0.00" required />
  </div>
  <div>
    <label class="lc-label" for="finance-form-due">Fecha objetivo</label>
    <input class="lc-input" id="finance-form-due" type="date" />
  </div>
  <div>
    <label class="lc-label" for="finance-form-account">Método de pago</label>
    <p class="lc-hint">Dónde entra o sale el dinero (Zelle, Binance, efectivo…).</p>
    <select class="lc-input" id="finance-form-account" required>
      <option value="">Selecciona un método</option>
    </select>
  </div>
  <div>
    <label class="lc-label" for="finance-form-domain">Dominio</label>
    <p class="lc-hint">Opcional. Se usa para el seguimiento de presupuesto por dominio.</p>
    <select class="lc-input" id="finance-form-domain">
      <option value="">Sin dominio</option>
    </select>
  </div>
  <p class="block-form__error" data-role="error" hidden></p>
  <div class="flex gap-2.5 [&_slice-button]:flex-1" data-role="actions"></div>
</form>
