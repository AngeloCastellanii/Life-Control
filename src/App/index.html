<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3f7359" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Life Control" />
    <meta name="application-name" content="Life Control" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Life Control</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/images/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <script type="module">
      import { getStyleCacheKey } from '/App/fetchCacheBust.js';
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `/App/style.css?v=${getStyleCacheKey()}`;
      document.head.appendChild(link);
    </script>
  </head>

  <body>
    <div id="app">
      <script src="/App/index.js" type="module"></script>
    </div>
  </body>
</html>
