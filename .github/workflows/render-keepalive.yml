name: Render keep-alive

on:
  schedule:
    # Cada 14 min — evita que Render (free) entre en sleep (~15 min sin tráfico)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Life Control on Render
        run: |
          curl -fsS --retry 3 --retry-delay 10 --max-time 30 \
            "https://lifecontrol-a5i4.onrender.com/api/status"
